<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FishLedger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
      :root {
        --bg-deep: #020617;
        --bg-card: #77b51310;
        --primary: #77b513;
        --btn-primary-gredient: linear-gradient(145deg, #5638b8, #432596);
        --secondary: #5638b8;
        --text-dim: #94a3b8;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--bg-deep);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      .container {
        flex: 1;
        padding: 5px;
        padding-top: 100px;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
      }

      .page {
        display: none;
        animation: fadeIn 0.3s ease-out;
      }
      .page.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(50px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        background: linear-gradient(145deg, #77b51305, #77b51315);
        border: 1px solid #77b51310;
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 20px;
      }

      .input-group {
        margin-bottom: 25px;
      }
      label {
        display: block;
        color: var(--text-dim);
        font-size: 0.8rem;
        margin-bottom: 6px;
        margin-left: 4px;
      }

      input {
        width: 100%;
        padding: 20px;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-dim);
        font-size: 1.2rem;
        font-weight: bold;
        outline: none;
        transition: all 0.4s ease;
        box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      input:focus {
        background: rgba(255, 255, 255, 0.12);
        box-shadow:
          0 0 0 2px #462aa1,
          inset 0 4px 15px rgba(79, 41, 184, 0.3);
      }

      .btn {
        width: 100%;
        padding: 23px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: transform 0.1s;
      }

      .btn:active {
        transform: scale(0.9);
      }

      .btn-primary {
        background: var(--btn-primary-gredient);
        color: rgb(176, 180, 178);
        box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .btn-danger {
        background: linear-gradient(145deg, #d93636, #961010);
        color: #fecaca;
        border: 1px solid #402a2b;
        margin-top: 12px;
      }
      .btn-outline {
        background: linear-gradient(145deg, #414244, #191e22);
        color: var(--text-dim);
        border: 1px solid #383e42;
        margin-top: 12px;
      }

      nav {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 600px;
        background-color: #171e2a;
        box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.3);
        display: flex;
        justify-content: space-around;
        z-index: 1000;
        padding: 7px;
        transition: 0.3s;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-dim);
        text-decoration: none;
        font-size: 0.75rem;
        font-weight: 600;
        transition: 0.3s;
        width: 100%;
        padding-top: 10px;
        padding-bottom: 10px;
        border-radius: 12px;
      }

      .nav-item svg {
        width: 24px;
        height: 24px;
        fill: currentColor;
        margin-bottom: 4px;
      }
      .nav-item.active {
        color: rgb(237, 234, 234);
        background: linear-gradient(130deg, #77b513, #61940f);
        box-shadow: 0 6px 20px rgba(100, 228, 46, 0.28);
      }

      .section-title {
        color: var(--primary);
        font-size: 1.2rem;
        border-left: 4px solid var(--primary);
        padding-left: 10px;
        margin-bottom: 15px;
      }
      .item-row {
        background: linear-gradient(145deg, #77b51305, #77b51315);
        border: 1px solid #77b51310;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        line-height: 1.6;
        font-size: 1.2rem;
      }

      .action-btns {
        display: flex;
        gap: 10px;
      }
      .btn-small {
        background-color: transparent;
        border: none;
        color: var(--text-dim);
      }

      .buyer-name {
        color: #575d67;
        text-transform: capitalize;
      }
      .item-details {
        color: var(--text-dim);
        font-weight: bold;
      }
      .item-total {
        color: var(--primary);
        font-weight: 700;
      }

      .summary-card {
        background: linear-gradient(145deg, #241e4505, #5638b820);
        border: 1px solid rgba(86, 56, 184, 0.3);
        box-shadow: 0px 6px 20px rgba(86, 56, 184, 0.2);
        color: var(--secondary);
        padding: 24px;
        border-radius: 20px;
        margin: 20px 0;
      }
      .summary-row {
        font-size: 1.2rem;
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
        font-weight: bold;
        line-height: 1.7;
      }
      .grand-total {
        margin-top: 10px;
        font-weight: 800;
        font-size: 1.4rem;
      }

      .calc-display {
        background: #020617;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        text-align: right;
      }

      #page-mix.active {
        display: flex !important;
        flex-direction: column;
        min-height: 80vh;
      }

      .dev-info {
        margin-top: auto;
        text-align: center;
        padding: 20px 10px;
        font-size: 0.8rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
      }

      .dev-info b {
        color: var(--primary);
      }

      .dev-info p {
        color: var(--text-dim);
      }

      .dev-info a {
        color: var(--secondary);
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="page-mix" class="page active">
        <div class="card">
          <div class="input-group">
            <label>BUYER NAME</label>
            <input type="text" id="mix-buyer" placeholder="Optional" />
          </div>
          <div class="input-group">
            <label>PRICE (MANDATORY)</label>
            <input
              type="text"
              id="mix-price"
              placeholder="Enter amount"
              inputmode="numeric"
            />
          </div>
          <button class="btn btn-primary" id="btn-mix-save" onclick="saveMix()">
            <span id="text-mix-save">SAVE MIX ITEM</span>
          </button>
        </div>

        <footer class="dev-info">
          <b>FishLedger</b>
          <p>
            Developed by
            <a
              href="https://mdjulhas.com"
              target="_blank"
              rel="noopener noreferrer"
              >Md Julhas</a
            >
          </p>
        </footer>
      </div>

      <div id="page-hilsa" class="page">
        <div class="card">
          <div class="input-group">
            <label>BUYER NAME</label>
            <input type="text" id="hilsa-buyer" placeholder="Optional" />
          </div>
          <div class="input-group">
            <label>MON PRICE (REQUIRED)</label>
            <input
              type="text"
              id="hilsa-mon-price"
              placeholder="Enter amount"
              inputmode="numeric"
            />
          </div>
          <div
            style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px"
          >
            <div class="input-group">
              <label>MON</label>
              <input
                type="text"
                id="hilsa-mon"
                placeholder="0"
                inputmode="numeric"
              />
            </div>
            <div class="input-group">
              <label>KG</label>
              <input
                type="text"
                id="hilsa-kg"
                placeholder="0"
                inputmode="numeric"
              />
            </div>
            <div class="input-group">
              <label>GRAM</label>
              <input
                type="text"
                id="hilsa-gram"
                placeholder="0"
                inputmode="numeric"
              />
            </div>
          </div>
          <div class="calc-display">
            <label>TOTAL PRICE</label>
            <div
              id="hilsa-display-total"
              style="font-size: 1.5rem; font-weight: 800; color: var(--primary)"
            >
              0
            </div>
          </div>
          <button
            class="btn btn-primary"
            id="btn-hilsa-save"
            onclick="saveHilsa()"
          >
            <span id="text-hilsa-save">SAVE HILSA ITEM</span>
          </button>
        </div>
      </div>

      <div id="page-report" class="page">
        <div class="section-title">HILSA FISH ITEMS</div>
        <div id="report-hilsa-list"></div>
        <div class="summary-card" id="hilsa-summary"></div>

        <div class="section-title">MIX FISH ITEMS</div>
        <div id="report-mix-list"></div>
        <div class="summary-card" id="total-summary"></div>

        <button class="btn btn-outline" onclick="downloadPDF()">
          <svg viewBox="0 0 24 24" width="20" style="fill: var(--text-dim)">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
          </svg>
          DOWNLOAD PDF
        </button>
        <button class="btn btn-danger" onclick="clearAllData()">
          CLEAR ALL DATA
        </button>
      </div>
    </div>

    <nav>
      <a href="#" class="nav-item active" onclick="showPage('mix', this)">
        <svg viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
        MIX
      </a>
      <a href="#" class="nav-item" onclick="showPage('hilsa', this)">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5z"
          />
        </svg>
        HILSA
      </a>
      <a href="#" class="nav-item" onclick="showPage('report', this)">
        <svg viewBox="0 0 24 24">
          <path
            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"
          />
        </svg>
        REPORT
      </a>
    </nav>

    <script>
      let db = JSON.parse(localStorage.getItem("fishAppDB")) || {
        mix: [],
        hilsa: [],
      }
      let editingId = null

      function handleNumberInput(e) {
        let value = e.target.value.replace(/,/g, "")
        if (!isNaN(value) && value !== "") {
          e.target.value = Number(value).toLocaleString("en-US")
        }
        if (e.target.id.startsWith("hilsa")) calcHilsa()
      }

      document
        .querySelectorAll('input[inputmode="numeric"]')
        .forEach((input) => {
          input.addEventListener("input", handleNumberInput)
        })

      function getCleanNum(id) {
        return (
          parseFloat(document.getElementById(id).value.replace(/,/g, "")) || 0
        )
      }

      function showPage(pageId, el) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"))
        document
          .querySelectorAll(".nav-item")
          .forEach((n) => n.classList.remove("active"))
        document.getElementById("page-" + pageId).classList.add("active")
        el.classList.add("active")
        if (pageId === "report") renderReport()
      }

      const formatNum = (num) => Number(num).toLocaleString("en-US")

      function calcHilsa() {
        const monPrice = getCleanNum("hilsa-mon-price")
        const mon = getCleanNum("hilsa-mon")
        const kg = getCleanNum("hilsa-kg")
        const gram = getCleanNum("hilsa-gram")

        const totalKg = mon * 40 + kg + gram / 1000
        const pricePerKg = monPrice / 40
        const total = totalKg * pricePerKg

        document.getElementById("hilsa-display-total").innerText = formatNum(
          total.toFixed(2),
        )
        return { total, totalKg }
      }

      function saveMix() {
        const buyer = document.getElementById("mix-buyer").value
        const price = getCleanNum("mix-price")
        if (!price) return alert("Price is mandatory")

        const item = { id: Date.now(), buyer, price }
        if (editingId) {
          db.mix = db.mix.map((i) => (i.id === editingId ? item : i))
          editingId = null
        } else {
          db.mix.push(item)
        }
        syncDB()
        clearInputs("mix")
      }

      function saveHilsa() {
        const monPrice = getCleanNum("hilsa-mon-price")
        if (!monPrice) return alert("Mon price required")
        const { total } = calcHilsa()
        const item = {
          id: Date.now(),
          buyer: document.getElementById("hilsa-buyer").value,
          monPrice,
          mon: getCleanNum("hilsa-mon"),
          kg: getCleanNum("hilsa-kg"),
          gram: getCleanNum("hilsa-gram"),
          total: total,
        }

        if (editingId) {
          db.hilsa = db.hilsa.map((i) => (i.id === editingId ? item : i))
          editingId = null
        } else {
          db.hilsa.push(item)
        }
        syncDB()
        clearInputs("hilsa")
      }

      function syncDB() {
        localStorage.setItem("fishAppDB", JSON.stringify(db))
      }

      function clearInputs(type) {
        editingId = null
        if (type === "mix") {
          document.getElementById("mix-buyer").value = ""
          document.getElementById("mix-price").value = ""
          document.getElementById("text-mix-save").innerText = "ADD MIX ITEM"
        } else {
          document.getElementById("hilsa-buyer").value = ""
          document.getElementById("hilsa-mon-price").value = ""
          document.getElementById("hilsa-mon").value = ""
          document.getElementById("hilsa-kg").value = ""
          document.getElementById("hilsa-gram").value = ""
          document.getElementById("hilsa-display-total").innerText = "0"
          document.getElementById("text-hilsa-save").innerText =
            "SAVE HILSA ITEM"
        }
      }

      function deleteItem(type, id) {
        const msg = "Delete this item?"
        if (confirm(msg)) {
          db[type] = db[type].filter((i) => i.id !== id)
          syncDB()
          renderReport()
        }
      }

      function editItem(type, id) {
        const msg = "Edit this item?"

        if (confirm(msg)) {
          const item = db[type].find((i) => i.id === id)
          editingId = id
          if (type === "mix") {
            showPage("mix", document.querySelectorAll(".nav-item")[0])
            document.getElementById("mix-buyer").value = item.buyer
            document.getElementById("mix-price").value = formatNum(item.price)
            document.getElementById("text-mix-save").innerText =
              "UPDATE MIX ITEM"
          } else {
            showPage("hilsa", document.querySelectorAll(".nav-item")[1])
            document.getElementById("hilsa-buyer").value = item.buyer
            document.getElementById("hilsa-mon-price").value = formatNum(
              item.monPrice,
            )
            document.getElementById("hilsa-mon").value = formatNum(item.mon)
            document.getElementById("hilsa-kg").value = formatNum(item.kg)
            document.getElementById("hilsa-gram").value = formatNum(item.gram)
            document.getElementById("text-hilsa-save").innerText =
              "UPDATE HILSA ITEM"
            calcHilsa()
          }
        }
      }

      function renderReport() {
        const hilsaList = document.getElementById("report-hilsa-list")
        const mixList = document.getElementById("report-mix-list")
        let hTotal = 0,
          hMon = 0,
          hKg = 0,
          hGram = 0

        hilsaList.innerHTML = db.hilsa
          .map((item) => {
            hTotal += item.total
            hMon += item.mon
            hKg += item.kg
            hGram += item.gram
            return `
            <div class="item-row">
                <div>
                    <span class="buyer-name">${item.buyer}</span>
                    <div class="item-details">${formatNum(item.monPrice)} * ${item.mon}m ${item.kg}k ${item.gram}g</div>
                    <div class="item-total">${formatNum(item.total.toFixed(2))}</div>
                </div>
                <div class="action-btns">
                     <button class="btn-small" onclick="editItem('hilsa', ${item.id})">
                          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-edit"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                      </button>
                      <button class="btn-small" onclick="deleteItem('hilsa', ${item.id})">
                           <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-trash-2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                      </button>
                  </div>
            </div>`
          })
          .join("")

        let finalKg = hKg + Math.floor(hGram / 1000)
        let finalGram = hGram % 1000
        let finalMon = hMon + Math.floor(finalKg / 40)
        finalKg = finalKg % 40

        document.getElementById("hilsa-summary").innerHTML = `
            <div class="summary-row"><span>Hilsa Weight:</span> <span>${finalMon}m ${finalKg}k ${finalGram}g</span></div>
            <div class="summary-row"><span>Hilsa Price:</span> <span>${formatNum(hTotal.toFixed(2))}</span></div>
        `

        let mTotal = 0
        mixList.innerHTML = db.mix
          .map((item) => {
            mTotal += item.price
            return `
            <div class="item-row">
                <div>
                  <span class="buyer-name">${item.buyer}</span>
                  <div class="item-total">${formatNum(item.price)}</div>
                </div>
                <div class="action-btns">
                  <button class="btn-small" onclick="editItem('mix', ${item.id})">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-edit"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                  </button>
                    <button class="btn-small" onclick="deleteItem('mix', ${item.id})">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-trash-2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                  </div>
            </div>`
          })
          .join("")

        document.getElementById("total-summary").innerHTML = `
            <div class="summary-row"><span>Mix Items Total:</span> <span>${formatNum(mTotal)}</span></div>
            <div class="summary-row grand-total"><span>Grand Total:</span> <span>${formatNum((hTotal + mTotal).toFixed(2))}</span></div>
        `
      }

      function clearAllData() {
        if (confirm("PERMANENTLY DELETE ALL DATA?")) {
          db = { mix: [], hilsa: [] }
          syncDB()
          renderReport()
        }
      }

      async function downloadPDF() {
        const { jsPDF } = window.jspdf
        const doc = new jsPDF()
        const dateStr = new Date().toLocaleDateString()

        doc.setFontSize(20)
        doc.setTextColor(40)
        doc.text("FISH LEDGER REPORT", 14, 22)
        doc.setFontSize(10)
        doc.text(`Generated on: ${dateStr}`, 14, 30)

        const hilsaTable = db.hilsa.map((i, idx) => [
          idx + 1,
          i.buyer,
          formatNum(i.monPrice),
          `${i.mon}m ${i.kg}k ${i.gram}g`,
          formatNum(i.total.toFixed(2)),
        ])

        doc.autoTable({
          startY: 40,
          head: [["#", "Buyer (Hilsa)", "Rate/Mon", "Weight", "Total"]],
          body: hilsaTable,
          headStyles: { fillColor: [163, 230, 53], textColor: [6, 78, 59] },
        })

        const mixTable = db.mix.map((i, idx) => [
          idx + 1,
          i.buyer,
          formatNum(i.price),
        ])

        doc.autoTable({
          startY: doc.lastAutoTable.finalY + 15,
          head: [["#", "Buyer (Mix)", "Price"]],
          body: mixTable,
          headStyles: { fillColor: [74, 222, 128], textColor: [6, 78, 59] },
        })

        const hTotal = db.hilsa.reduce((sum, i) => sum + i.total, 0)
        const mTotal = db.mix.reduce((sum, i) => sum + i.price, 0)
        const grandTotal = hTotal + mTotal

        const finalY = doc.lastAutoTable.finalY + 20
        doc.setFontSize(12)
        doc.setTextColor(100)
        doc.text(`Hilsa Subtotal: ${formatNum(hTotal.toFixed(2))}`, 140, finalY)
        doc.text(
          `Mix Subtotal: ${formatNum(mTotal.toFixed(2))}`,
          140,
          finalY + 7,
        )

        doc.setFontSize(16)
        doc.setTextColor(6, 78, 59)
        doc.text(
          `GRAND TOTAL: ${formatNum(grandTotal.toFixed(2))}`,
          140,
          finalY + 18,
          { align: "right" },
        )
