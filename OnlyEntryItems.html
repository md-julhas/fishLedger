<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fish Wholesale App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #5a67d8;
        --primary-hover: #4c51bf;
        --success-color: #10b981;
        --danger-color: #ef4444;
        --background-color: #f3f4f6;
        --card-background: #ffffff;
        --text-color: #1f2937;
        --border-color: #e5e7eb;
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      body {
        font-family: "Roboto", sans-serif;
        margin: 0;
        background-color: var(--background-color);
        color: var(--text-color);
        line-height: 1.6;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 10vh;
      }

      .container {
        width: 100%;
        max-width: 650px;
        margin: 0.5rem;
      }

      .item-form,
      .list-section {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .form-row {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }

      .type-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .type-btn {
        flex: 1;
        background-color: #fbfbfb;
        color: #4a5568;
        padding: 16px 16px;
        font-weight: 600;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        transition: all 0.2s ease;
      }

      .type-btn.active {
        color: #fff;
        background-color: var(--primary-color);
      }

      input[type="text"],
      input[type="number"] {
        padding: 15px;
        font-size: 1.2rem;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        width: 100%;
        box-sizing: border-box;
        transition: all 0.3s ease;
        font-weight: bold;
        margin-top: 10px;
      }

      #input-container > input:first-child {
        margin-top: 0;
      }

      input[type="text"]:focus,
      input[type="number"]:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.2);
      }

      .hilsa-mon-kg-gram {
        display: flex;
        gap: 10px;
        width: 100%;
      }

      .hilsa-mon-kg-gram input {
        margin-top: 10px;
      }

      .hilsa-price-mon-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      button {
        padding: 20px 24px;
        font-size: 1rem;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        color: #fff;
        font-weight: 600;
        transition: background-color 0.3s ease, transform 0.1s;
      }

      button.tab-btn {
        padding: 20px;
        background-color: var(--card-background);
        color: var(--text-color);
        border: 1px solid var(--border-color);
        font-weight: 700;
        width: 100%;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      button.tab-btn.active {
        background-color: var(--primary-color);
        color: #fff;
        border-color: var(--primary-color);
      }

      #addItemBtn {
        background-color: var(--success-color);
        width: 100%;
        box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);
      }

      #addItemBtn:hover {
        background-color: #059669;
        transform: translateY(-2px);
      }

      .hilsa-info {
        display: none;
        gap: 12px;
        flex-wrap: wrap;
      }

      .hilsa-info input {
        flex: 1 1 120px;
      }

      .list-section {
        margin-top: 1rem;
      }

      .item-list-section {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .category-list-container {
        margin-top: 1rem;
      }

      .category-list-container h4 {
        font-size: 1.25rem;
        color: #9296a1;
        border-bottom: 1px dashed var(--border-color);
        padding-bottom: 5px;
        margin: 0px;
      }

      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 5px;
        border-bottom: 1px dashed var(--border-color);
        transition: transform 0.2s ease;
      }

      .list-item:hover {
        background-color: var(--border-color);
      }

      .list-item strong {
        color: var(--primary-color);
      }

      .item-details {
        flex-grow: 1;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .item-details p {
        margin: 0;
        font-size: 1.1rem;
        color: #5d6373;
      }

      .hilsa-details {
        font-size: 0.9rem;
        color: #6b7280;
        margin-top: 4px;
      }

      .item-actions button {
        background-color: transparent;
        color: #9ca3af;
        margin: 8px 1px;
        padding: 0;
        font-size: 1.1rem;
        transition: color 0.2s, transform 0.1s;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .item-actions button svg {
        width: 1.2rem;
        height: 1.2rem;
        stroke: #9ca3af;
        stroke-width: 2;
        fill: none;
        transition: stroke 0.2s;
      }

      .item-actions button:hover svg {
        stroke: var(--danger-color);
      }

      .item-actions .delete-btn:hover svg {
        stroke: var(--danger-color);
      }

      .item-actions .edit-btn:hover svg {
        stroke: var(--primary-color);
      }

      .total-section {
        text-align: right;
        margin-top: 1.2rem;
      }

      .total-section h3 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary-color);
        margin: 0;
      }

      .clear-all-btn {
        background-color: var(--danger-color);
        width: 100%;
        margin-top: 1.5rem;
      }

      .clear-all-btn:hover {
        background-color: #dc2626;
        transform: translateY(-2px);
      }

      .tabs {
        display: flex;
        justify-content: center;
        margin-bottom: 1rem;
        gap: 10px;
      }

      .content {
        background-color: var(--card-background);
        padding: 20px;
        border-radius: 10px;
        box-shadow: var(--shadow);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .item-details-content {
        display: flex;
        flex-direction: column;
      }

      .item-serial {
        background-color: rgb(206, 205, 205);
        color: white;
        font-size: 0.8rem;
        font-weight: 700;
        min-width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .category-section {
        margin-bottom: 20px;
      }

      .category-section h4 {
        margin-bottom: 10px;
        font-size: 1.2rem;
        color: var(--primary-color);
        border-bottom: 2px solid var(--primary-color);
        padding-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div id="entry-items-section" class="tab-content active">
          <div class="item-form">
            <div class="type-buttons">
              <button id="mixFishBtn" class="type-btn active">Mix Fish</button>
              <button id="hilsaMonBtn" class="type-btn">Hilsa Mon</button>
            </div>
            <div id="input-container"></div>
            <button id="addItemBtn">Add Item</button>
          </div>
          <div class="list-section">
            <div class="category-list-container">
              <h4>Hilsa Items</h4>
              <div id="hilsaItemsList"></div>
            </div>
            <div class="category-list-container">
              <h4>Mix Items</h4>
              <div id="mixItemsList"></div>
            </div>
            <div class="total-section">
              <h3>Total: <span id="totalAmount">0</span></h3>
            </div>
            <button id="clearAllBtn" class="clear-all-btn">
              Delete All Items
            </button>
            <button
              id="downloadPdfBtn"
              class="clear-all-btn"
              style="background-color: var(--primary-color); margin-top: 10px"
            >
              Download PDF
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Entry Items Type Buttons
        const mixFishBtn = document.getElementById("mixFishBtn");
        const hilsaMonBtn = document.getElementById("hilsaMonBtn");

        // Entry Form Elements
        const inputContainer = document.getElementById("input-container");
        const addItemBtn = document.getElementById("addItemBtn");
        let currentItemType =
          localStorage.getItem("activeFormType") || "mix_fish";

        // Lists for displaying items
        const hilsaItemsListDiv = document.getElementById("hilsaItemsList");
        const mixItemsListDiv = document.getElementById("mixItemsList");
        const totalAmountSpan = document.getElementById("totalAmount");
        const clearAllBtn = document.getElementById("clearAllBtn");
        const downloadPdfBtn = document.getElementById("downloadPdfBtn");

        let isEditing = false;
        let editIndex = null;

        // --- Utility Functions ---
        const formatNumberWithCommas = (number) => {
          if (typeof number !== "number" || isNaN(number)) {
            return "0";
          }
          return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        const parseNumber = (str) => {
          const value = String(str).replace(/,/g, "");
          return parseFloat(value) || 0;
        };

        const formatInput = (input) => {
          const value = input.value.replace(/,/g, "");
          if (value) {
            input.value = formatNumberWithCommas(parseInt(value, 10));
          }
        };

        // --- Dynamic Form Logic ---
        const renderForm = (type, data = {}) => {
          inputContainer.innerHTML = "";
          let html = `<input type="text" id="itemName" placeholder="Buyer Name (optional)" value="${
            data.name || ""
          }"/>`;
          let priceInputId = "containerPrice";

          switch (type) {
            case "mix_fish":
              html += `<input type="text" id="${priceInputId}" placeholder="Container Price" required inputmode="decimal" pattern="[0-9.,]*" value="${
                data.price ? formatNumberWithCommas(data.price) : ""
              }"/>`;
              break;
            case "hilsa_mon":
              html += `
                            <div class="hilsa-price-mon-row">
                                <input type="text" id="hilsaPrice" placeholder="Mon Price" inputmode="decimal" pattern="[0-9.,]*" value="${
                                  data.hilsaInfo && data.hilsaInfo.monPrice
                                    ? formatNumberWithCommas(
                                        data.hilsaInfo.monPrice
                                      )
                                    : ""
                                }">
                                <input type="number" id="mon" placeholder="Mon Amount" value="${
                                  data.hilsaInfo && data.hilsaInfo.mon
                                    ? data.hilsaInfo.mon
                                    : ""
                                }">
                            </div>
                            <div class="hilsa-mon-kg-gram">
                                <input type="number" id="kg" placeholder="Kg" value="${
                                  data.hilsaInfo && data.hilsaInfo.kg
                                    ? data.hilsaInfo.kg
                                    : ""
                                }">
                                <input type="number" id="gram" placeholder="Gram" value="${
                                  data.hilsaInfo && data.hilsaInfo.gram
                                    ? data.hilsaInfo.gram
                                    : ""
                                }">
                            </div>
                            <input type="text" id="${priceInputId}" placeholder="Total Mon Amount" required inputmode="decimal" pattern="[0-9.,]*" value="${
                data.price ? formatNumberWithCommas(data.price) : ""
              }">
                        `;
              break;
          }

          inputContainer.innerHTML = html;
          const currentPriceInput = document.getElementById(priceInputId);
          currentPriceInput.addEventListener("input", () =>
            formatInput(currentPriceInput)
          );

          // Add event listeners for Enter key on all input fields
          const inputs = inputContainer.querySelectorAll('input');
          inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                if (index < inputs.length - 1) {
                  // Focus on next input if not the last one
                  inputs[index + 1].focus();
                } else {
                  // If it's the last input, trigger the add item button
                  addItemBtn.click();
                }
              }
            });
          });

          if (type === "hilsa_mon") {
            const hilsaPriceInput = document.getElementById("hilsaPrice");
            const monInput = document.getElementById("mon");
            const kgInput = document.getElementById("kg");
            const gramInput = document.getElementById("gram");
            hilsaPriceInput.addEventListener("input", () =>
              formatInput(hilsaPriceInput)
            );
            [hilsaPriceInput, monInput, kgInput, gramInput].forEach((input) =>
              input.addEventListener("input", () => {
                updateHilsaMonTotal();
                if (!isEditing) saveHilsaMonData();
              })
            );
            document
              .getElementById("itemName")
              .addEventListener("input", () => {
                if (!isEditing) saveHilsaMonData();
              });
          }
        };

        const updateHilsaMonTotal = () => {
          const hilsaPrice = parseNumber(
            document.getElementById("hilsaPrice").value
          );
          const mon = parseFloat(document.getElementById("mon").value) || 0;
          const kg = parseFloat(document.getElementById("kg").value) || 0;
          const gram = parseFloat(document.getElementById("gram").value) || 0;
          const pricePerKg = hilsaPrice / 40;
          const totalKg = mon * 40 + kg + gram / 1000;
          const total = totalKg * pricePerKg;
          document.getElementById("containerPrice").value =
            formatNumberWithCommas(Math.round(total));
        };

        // --- Local Storage for Hilsa Mon form ---
        const saveHilsaMonData = () => {
          const itemName = document.getElementById("itemName").value;
          const hilsaPrice = parseNumber(
            document.getElementById("hilsaPrice").value
          );
          const mon = parseFloat(document.getElementById("mon").value) || 0;
          const kg = parseFloat(document.getElementById("kg").value) || 0;
          const gram = parseFloat(document.getElementById("gram").value) || 0;

          // Check if all fields are empty or 0
          if (
            !itemName &&
            hilsaPrice === 0 &&
            mon === 0 &&
            kg === 0 &&
            gram === 0
          ) {
            clearHilsaMonData();
            return;
          }

          const data = {
            name: itemName,
            hilsaInfo: {
              monPrice: hilsaPrice,
              mon: mon,
              kg: kg,
              gram: gram,
            },
            price: parseNumber(document.getElementById("containerPrice").value),
          };
          localStorage.setItem("hilsaMonFormData", JSON.stringify(data));
        };

        const loadHilsaMonData = () => {
          const data = localStorage.getItem("hilsaMonFormData");
          if (data) {
            const parsedData = JSON.parse(data);
            if (parsedData) {
              return parsedData;
            }
          }
          return {};
        };

        const clearHilsaMonData = () => {
          localStorage.removeItem("hilsaMonFormData");
        };

        // --- Event Listeners for Type Buttons ---
        mixFishBtn.addEventListener("click", () => {
          currentItemType = "mix_fish";
          document
            .querySelectorAll(".type-btn")
            .forEach((btn) => btn.classList.remove("active"));
          mixFishBtn.classList.add("active");
          renderForm(currentItemType);
          addItemBtn.textContent = "Add Item";
          isEditing = false;
        });

        hilsaMonBtn.addEventListener("click", () => {
          currentItemType = "hilsa_mon";
          document
            .querySelectorAll(".type-btn")
            .forEach((btn) => btn.classList.remove("active"));
          hilsaMonBtn.classList.add("active");
          const savedData = loadHilsaMonData();
          renderForm(currentItemType, savedData);
          addItemBtn.textContent = "Add Item";
          isEditing = false;
        });

        // --- Add/Save Item Logic ---
        addItemBtn.addEventListener("click", () => {
          const items = JSON.parse(localStorage.getItem("hilsaAppItems")) || [];
          const priceInput = document.getElementById("containerPrice");
          const itemName = document.getElementById("itemName").value;
          const price = parseNumber(priceInput.value);

          if (price === 0) {
            alert("Price is required!");
            return;
          }

          let newItem = { type: currentItemType, name: itemName, price: price };

          if (currentItemType === "hilsa_mon") {
            newItem.hilsaInfo = {
              monPrice: parseNumber(
                document.getElementById("hilsaPrice").value
              ),
              mon: parseFloat(document.getElementById("mon").value) || 0,
              kg: parseFloat(document.getElementById("kg").value) || 0,
              gram: parseFloat(document.getElementById("gram").value) || 0,
            };
          }

          if (isEditing) {
            items[editIndex] = { ...newItem, serial: items[editIndex].serial };
            isEditing = false;
            editIndex = null;
          } else {
            newItem.serial = items.length + 1;
            items.push(newItem);
            // Only clear the form data after adding a NEW item
            if (currentItemType === "hilsa_mon") {
              clearHilsaMonData();
            }
          }

          localStorage.setItem("hilsaAppItems", JSON.stringify(items));
          renderItems();
          renderForm(currentItemType);
          addItemBtn.textContent = "Add Item";
        });

        // --- Render Items ---
        const renderItems = () => {
          const items = JSON.parse(localStorage.getItem("hilsaAppItems")) || [];
          hilsaItemsListDiv.innerHTML = "";
          mixItemsListDiv.innerHTML = "";
          let total = 0;

          const hilsaMonItems = items.filter(
            (item) => item.type === "hilsa_mon"
          );
          const mixFishItems = items.filter((item) => item.type === "mix_fish");

          hilsaMonItems.forEach((item, index) => {
            renderItem(item, items.indexOf(item), hilsaItemsListDiv);
          });
          mixFishItems.forEach((item, index) => {
            renderItem(item, items.indexOf(item), mixItemsListDiv);
          });

          total = items.reduce((sum, item) => sum + item.price, 0);

          totalAmountSpan.textContent = formatNumberWithCommas(total);
        };

        const renderItem = (item, index, parentDiv) => {
          let nameHtml = item.name ? `<p>${item.name}</p>` : "";
          let detailsHtml = "";

          if (item.type === "hilsa_mon" && item.hilsaInfo) {
            const { monPrice, mon, kg, gram } = item.hilsaInfo;
            detailsHtml = `<p class="hilsa-details">Mon Price: ${formatNumberWithCommas(
              monPrice
            )} | ${mon} Mon, ${kg} Kg, ${gram} Gram</p>`;
          }

          const itemDiv = document.createElement("div");
          itemDiv.classList.add("list-item");
          itemDiv.innerHTML = `
                    <div class="item-details">
                        <div class="item-serial">${item.serial}</div>
                        <div class="item-details-content">
                            <p><strong>${formatNumberWithCommas(
                              item.price
                            )}</strong> ${item.name || ""}</p>
                            ${detailsHtml}
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="edit-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-edit"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="delete-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-trash-2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                `;
          parentDiv.appendChild(itemDiv);

          itemDiv
            .querySelector(".edit-btn")
            .addEventListener("click", () => editItem(index));
          itemDiv
            .querySelector(".delete-btn")
            .addEventListener("click", () => deleteItem(index));
        };

        const editItem = (index) => {
          const items = JSON.parse(localStorage.getItem("hilsaAppItems"));
          const itemToEdit = items[index];

          currentItemType = itemToEdit.type;

          document
            .querySelectorAll(".type-btn")
            .forEach((btn) => btn.classList.remove("active"));
          if (currentItemType === "mix_fish") {
            mixFishBtn.classList.add("active");
          } else {
            hilsaMonBtn.classList.add("active");
          }

          // Render the form with the item's data
          renderForm(currentItemType, itemToEdit);
          isEditing = true;
          editIndex = index;
          addItemBtn.textContent = "Save Changes";

          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        const deleteItem = (index) => {
          const confirmation = confirm(
            "Are you sure you want to delete this item?"
          );
          if (confirmation) {
            let items = JSON.parse(localStorage.getItem("hilsaAppItems"));
            items.splice(index, 1);
            items = items.map((item, i) => ({ ...item, serial: i + 1 }));
            localStorage.setItem("hilsaAppItems", JSON.stringify(items));
            renderItems();
          }
        };

        // --- Other Button Functions ---
        clearAllBtn.addEventListener("click", () => {
          const confirmation = confirm(
            "Are you sure you want to delete all items? This action cannot be undone."
          );
          if (confirmation) {
            localStorage.clear();
            renderItems();
            clearHilsaMonData();
            renderForm(currentItemType);
          }
        });

        downloadPdfBtn.addEventListener("click", () => {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          const items = JSON.parse(localStorage.getItem("hilsaAppItems")) || [];
          const totalAmount = parseNumber(totalAmountSpan.textContent);

          doc.setFontSize(18);
          doc.text("Fish Sales Report", 14, 22);
          doc.setFontSize(12);
          let y = 30;

          if (items.length === 0) {
            doc.text("No items to display.", 14, y);
          } else {
            items.forEach((item, index) => {
              let itemText = `${item.serial}) ${formatNumberWithCommas(
                item.price
              )}`;
              if (item.name) {
                itemText += ` ${item.name}`;
              }
              if (item.type === "hilsa_mon" && item.hilsaInfo) {
                const hilsa = item.hilsaInfo;
                itemText += ` (Mon Price: ${formatNumberWithCommas(
                  hilsa.monPrice
                )} | ${hilsa.mon} Mon, ${hilsa.kg} Kg, ${hilsa.gram} Gram)`;
              }
              doc.text(itemText, 14, y);
              y += 7;
              if (y > 280) {
                doc.addPage();
                y = 14;
              }
            });

            doc.line(14, y, 196, y);
            y += 10;
            doc.setFontSize(14);
            doc.text(`Total: ${formatNumberWithCommas(totalAmount)}`, 14, y);
          }
          doc.save("fish_sales_report.pdf");
        });

        // Initial setup
        const initialFormType = "mix_fish";
        mixFishBtn.classList.add("active");
        renderForm(initialFormType);
        renderItems();
      });
    </script>
  </body>
</html>
